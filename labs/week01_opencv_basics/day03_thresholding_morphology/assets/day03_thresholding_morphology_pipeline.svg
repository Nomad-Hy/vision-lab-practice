<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#f7f7f7"/>
  <text x="600" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#222">Day 3 - Thresholding &amp; Morphology Pipeline</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" font-size="18" fill="#222" text-anchor="middle">
    <g transform="translate(60,115)">
      <rect width="130" height="90" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
      <text x="65" y="38" font-weight="700">Original</text>
      <text x="65" y="65" font-size="14">lighting/noise</text>
    </g>
    <line x1="200" y1="160" x2="270" y2="160" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(280,115)">
      <rect width="130" height="90" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
      <text x="65" y="38" font-weight="700">Grayscale</text>
      <text x="65" y="65" font-size="14">brightness only</text>
    </g>
    <line x1="420" y1="160" x2="490" y2="160" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(500,115)">
      <rect width="145" height="90" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
      <text x="72" y="34" font-weight="700">Threshold</text>
      <text x="72" y="60" font-size="14">fixed / Otsu</text>
      <text x="72" y="78" font-size="14">adaptive</text>
    </g>
    <line x1="655" y1="160" x2="725" y2="160" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(735,115)">
      <rect width="130" height="90" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
      <text x="65" y="38" font-weight="700">Binary Mask</text>
      <text x="65" y="65" font-size="14">0 or 255</text>
    </g>
    <line x1="875" y1="160" x2="945" y2="160" stroke="#333" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(955,115)">
      <rect width="170" height="90" rx="14" fill="#fff" stroke="#333" stroke-width="2"/>
      <text x="85" y="34" font-weight="700">Morphology</text>
      <text x="85" y="60" font-size="14">open / close</text>
      <text x="85" y="78" font-size="14">erode / dilate</text>
    </g>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#222">
    <rect x="90" y="270" width="1020" height="95" rx="16" fill="#ffffff" stroke="#999"/>
    <text x="120" y="305" font-weight="700">Analysis focus</text>
    <text x="120" y="335">False Positive: background/reflection/noise is incorrectly detected as foreground.</text>
    <text x="120" y="360">False Negative: real object/defect disappears due to threshold or over-strong morphology.</text>
  </g>
</svg>
