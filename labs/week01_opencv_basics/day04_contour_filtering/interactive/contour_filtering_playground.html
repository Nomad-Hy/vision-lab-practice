<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 4 Contour Filtering Playground</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --ok: #3fb950;
      --bad: #f85149;
      --warn: #d29922;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
    }

    h1 { margin: 0 0 8px; font-size: clamp(24px, 4vw, 38px); }
    h2 { font-size: 18px; margin: 0 0 14px; }
    p { color: var(--muted); line-height: 1.65; }

    .notice {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 18px 0 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(290px, 360px) 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .control {
      margin-bottom: 18px;
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="range"] { width: 100%; }

    label.checkbox {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat strong { display: block; font-size: 24px; margin-top: 4px; }

    .canvas-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #0a0d12;
      padding: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      min-width: 650px;
      height: auto;
      background: #11161d;
      border-radius: 8px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 14px 0 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 9px 7px;
      text-align: left;
      vertical-align: top;
    }

    th { color: var(--muted); font-weight: 600; }
    .accepted { color: var(--ok); }
    .rejected { color: var(--bad); }

    button {
      width: 100%;
      border: 1px solid var(--border);
      background: #21262d;
      color: var(--text);
      padding: 10px 12px;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 650;
    }

    button:hover { border-color: var(--accent); }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Contour Filtering Playground</h1>
    <p>가상 contour 후보의 특징값을 기준으로 필터가 어떻게 통과·탈락을 바꾸는지 확인합니다.</p>

    <div class="notice">
      이 자료는 Python 구현 정답을 제공하지 않습니다. OpenCV에서 계산되었다고 가정한 후보 데이터를 사용해
      <strong>면적, 종횡비, 채움 비율, 경계 접촉 규칙</strong>의 영향을 시각화합니다.
    </div>

    <div class="layout">
      <section class="panel">
        <h2>Filter Parameters</h2>

        <div class="control">
          <div class="control-head"><span>최소 면적</span><strong id="minAreaValue"></strong></div>
          <input id="minArea" type="range" min="0" max="600" step="10" value="60" />
        </div>

        <div class="control">
          <div class="control-head"><span>최대 면적</span><strong id="maxAreaValue"></strong></div>
          <input id="maxArea" type="range" min="200" max="2400" step="50" value="1600" />
        </div>

        <div class="control">
          <div class="control-head"><span>최소 종횡비</span><strong id="minAspectValue"></strong></div>
          <input id="minAspect" type="range" min="0.1" max="2.0" step="0.1" value="0.3" />
        </div>

        <div class="control">
          <div class="control-head"><span>최대 종횡비</span><strong id="maxAspectValue"></strong></div>
          <input id="maxAspect" type="range" min="1.0" max="10.0" step="0.2" value="6.0" />
        </div>

        <div class="control">
          <div class="control-head"><span>최소 채움 비율</span><strong id="minFillValue"></strong></div>
          <input id="minFill" type="range" min="0.05" max="0.95" step="0.05" value="0.25" />
        </div>

        <div class="control">
          <label class="checkbox">
            <input id="excludeBorder" type="checkbox" checked />
            이미지 경계 후보 제외
          </label>
        </div>

        <button id="resetButton" type="button">초기값으로 되돌리기</button>
      </section>

      <section class="panel">
        <div class="stats">
          <div class="stat">전체<strong id="totalCount">0</strong></div>
          <div class="stat">통과<strong id="acceptedCount">0</strong></div>
          <div class="stat">탈락<strong id="rejectedCount">0</strong></div>
        </div>

        <div class="canvas-wrap">
          <canvas id="scene" width="900" height="500"></canvas>
        </div>

        <div class="legend">
          <span><i class="dot" style="background: var(--ok)"></i>통과</span>
          <span><i class="dot" style="background: var(--bad)"></i>탈락</span>
          <span><i class="dot" style="background: var(--warn)"></i>경계 접촉</span>
        </div>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>면적</th>
              <th>종횡비</th>
              <th>채움</th>
              <th>경계</th>
              <th>판정 이유</th>
            </tr>
          </thead>
          <tbody id="candidateRows"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    const candidates = [
      { id: 1, x: 40,  y: 45,  w: 18,  h: 14, area: 150, fill: 0.60, border: false },
      { id: 2, x: 110, y: 70,  w: 65,  h: 12, area: 510, fill: 0.65, border: false },
      { id: 3, x: 235, y: 40,  w: 38,  h: 36, area: 980, fill: 0.72, border: false },
      { id: 4, x: 340, y: 95,  w: 95,  h: 58, area: 2050, fill: 0.37, border: false },
      { id: 5, x: 510, y: 40,  w: 10,  h: 8,  area: 38, fill: 0.48, border: false },
      { id: 6, x: 590, y: 95,  w: 22,  h: 70, area: 820, fill: 0.53, border: false },
      { id: 7, x: 740, y: 30,  w: 155, h: 42, area: 1450, fill: 0.22, border: true  },
      { id: 8, x: 0,   y: 250, w: 70,  h: 85, area: 1550, fill: 0.26, border: true  },
      { id: 9, x: 145, y: 255, w: 54,  h: 50, area: 1750, fill: 0.65, border: false },
      { id: 10,x: 300, y: 280, w: 130, h: 18, area: 1200, fill: 0.51, border: false },
      { id: 11,x: 520, y: 250, w: 48,  h: 92, area: 1120, fill: 0.25, border: false },
      { id: 12,x: 680, y: 260, w: 84,  h: 78, area: 420, fill: 0.06, border: false },
    ].map(item => ({ ...item, aspect: item.w / item.h }));

    const controls = {
      minArea: document.getElementById("minArea"),
      maxArea: document.getElementById("maxArea"),
      minAspect: document.getElementById("minAspect"),
      maxAspect: document.getElementById("maxAspect"),
      minFill: document.getElementById("minFill"),
      excludeBorder: document.getElementById("excludeBorder"),
    };

    const values = {
      minArea: document.getElementById("minAreaValue"),
      maxArea: document.getElementById("maxAreaValue"),
      minAspect: document.getElementById("minAspectValue"),
      maxAspect: document.getElementById("maxAspectValue"),
      minFill: document.getElementById("minFillValue"),
    };

    const canvas = document.getElementById("scene");
    const context = canvas.getContext("2d");
    const rows = document.getElementById("candidateRows");

    function currentConfig() {
      return {
        minArea: Number(controls.minArea.value),
        maxArea: Number(controls.maxArea.value),
        minAspect: Number(controls.minAspect.value),
        maxAspect: Number(controls.maxAspect.value),
        minFill: Number(controls.minFill.value),
        excludeBorder: controls.excludeBorder.checked,
      };
    }

    function evaluate(candidate, config) {
      const reasons = [];
      if (candidate.area < config.minArea) reasons.push("면적 작음");
      if (candidate.area > config.maxArea) reasons.push("면적 큼");
      if (candidate.aspect < config.minAspect) reasons.push("종횡비 낮음");
      if (candidate.aspect > config.maxAspect) reasons.push("종횡비 높음");
      if (candidate.fill < config.minFill) reasons.push("채움 낮음");
      if (config.excludeBorder && candidate.border) reasons.push("경계 접촉");
      return { accepted: reasons.length === 0, reasons };
    }

    function drawScene(results) {
      context.clearRect(0, 0, canvas.width, canvas.height);
      context.fillStyle = "#11161d";
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.strokeStyle = "#30363d";
      context.lineWidth = 2;
      context.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

      results.forEach(({ candidate, accepted }) => {
        context.lineWidth = 4;
        context.strokeStyle = accepted ? "#3fb950" : candidate.border ? "#d29922" : "#f85149";
        context.strokeRect(candidate.x, candidate.y, candidate.w, candidate.h);

        context.fillStyle = accepted ? "rgba(63,185,80,0.18)" : "rgba(248,81,73,0.15)";
        context.fillRect(candidate.x, candidate.y, candidate.w, candidate.h);

        context.fillStyle = "#e6edf3";
        context.font = "bold 16px system-ui";
        const labelY = Math.max(18, candidate.y - 7);
        context.fillText(`#${candidate.id}`, candidate.x + 3, labelY);
      });
    }

    function renderTable(results) {
      rows.innerHTML = "";
      results.forEach(({ candidate, accepted, reasons }) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>#${candidate.id}</td>
          <td>${candidate.area}</td>
          <td>${candidate.aspect.toFixed(2)}</td>
          <td>${candidate.fill.toFixed(2)}</td>
          <td>${candidate.border ? "예" : "아니오"}</td>
          <td class="${accepted ? "accepted" : "rejected"}">
            ${accepted ? "통과" : reasons.join(", ")}
          </td>
        `;
        rows.appendChild(tr);
      });
    }

    function update() {
      const config = currentConfig();
      values.minArea.textContent = config.minArea;
      values.maxArea.textContent = config.maxArea;
      values.minAspect.textContent = config.minAspect.toFixed(1);
      values.maxAspect.textContent = config.maxAspect.toFixed(1);
      values.minFill.textContent = config.minFill.toFixed(2);

      const results = candidates.map(candidate => ({ candidate, ...evaluate(candidate, config) }));
      const acceptedCount = results.filter(result => result.accepted).length;

      document.getElementById("totalCount").textContent = results.length;
      document.getElementById("acceptedCount").textContent = acceptedCount;
      document.getElementById("rejectedCount").textContent = results.length - acceptedCount;

      drawScene(results);
      renderTable(results);
    }

    Object.values(controls).forEach(control => control.addEventListener("input", update));

    document.getElementById("resetButton").addEventListener("click", () => {
      controls.minArea.value = 60;
      controls.maxArea.value = 1600;
      controls.minAspect.value = 0.3;
      controls.maxAspect.value = 6.0;
      controls.minFill.value = 0.25;
      controls.excludeBorder.checked = true;
      update();
    });

    update();
  </script>
</body>
</html>
